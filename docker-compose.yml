services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - ai
  ai:
    build: ./ai
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
